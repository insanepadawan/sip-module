version: "3.9"

services:
  asterisk-ivr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asterisk-ivr
    network_mode: host          # eliminates iptables port-range problem
    cap_add:
      - NET_ADMIN               # removed SYS_PTRACE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - asterisk-logs:/var/log/asterisk
      - asterisk-sounds:/var/lib/asterisk/sounds/ivr
      - asterisk-recordings:/var/spool/asterisk
    restart: on-failure:5       # stops crash-looping
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=Europe/Chisinau
      - SIP_PASSWORD_1001=${SIP_PASSWORD_1001}
      - SIP_PASSWORD_1002=${SIP_PASSWORD_1002}
      - SIP_PASSWORD_1003=${SIP_PASSWORD_1003}

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - asterisk-logs:/var/log/asterisk:ro
      - ./fail2ban:/data
    restart: always

volumes:
  asterisk-logs:
  asterisk-sounds:
  asterisk-recordings: