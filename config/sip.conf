[general]
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=no
tcpbindaddr=0.0.0.0
transport=udp
srvlookup=yes
qualify=yes
nat=force_rport,comedia
directmedia=no
relaxdtmf=yes
dtmfmode=rfc2833
language=ru
disallow=all
allow=ulaw
allow=alaw
allow=g722
externip=1.2.3.4; -- will be patched at runtime by entrypoint.sh --
localnet=10.0.0.0/8
allowguest=no
alwaysauthreject=yes

[general_template](!)
type=friend
host=dynamic
secret=secret123
context=ivr-context
disallow=all
allow=ulaw
allow=alaw
dtmfmode=rfc2833
nat=force_rport,comedia
directmedia=no
qualify=yes


[general_template](!)
type=friend
host=dynamic
context=ivr

[1001](general_template)
callerid="Test User 1" <1001>
secret=__PASSWORD_1001__

[1002](general_template)
callerid="Test User 2" <1002>
secret=__PASSWORD_1002__

