; ============================================================
;  IVR МЕНЮ — extensions.conf
;  Короткий номер: 100
; ============================================================

[globals]
IVR_SOUNDS=/usr/share/asterisk/sounds/ivr

[default]
exten => _X.,1,Goto(ivr-context,${EXTEN},1)

; ============================================================
;  КОНТЕКСТ: ivr-context
;  Входящая точка — номер 100
; ============================================================
[ivr-context]

; --- Главное меню ---
exten => 100,1,NoOp(=== IVR START === CID: ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n(menu),Background(ivr/main_menu)
 same => n,WaitExten(10)
 same => n,Goto(ivr-context,100,menu)    ; таймаут — повтор меню

; --- Нажата 1: «Вы улыбнулись» ---
exten => 1,1,NoOp(=== OPTION 1: SMILE ===)
 same => n,Playback(ivr/you_smiled)
 same => n,Wait(1)
 same => n,Hangup()

; --- Нажата 2: «Усложнить задание» ---
exten => 2,1,NoOp(=== OPTION 2: PRESS ANY DIGIT ===)
 same => n,Playback(ivr/press_any_digit)
 same => n,WaitExten(15)

; Ожидание любой цифры 0-9
exten => _[0-9],1,NoOp(=== DIGIT PRESSED: ${EXTEN} ===)
 same => n,Playback(ivr/you_pressed_${EXTEN})
 same => n,Wait(1)
 same => n,Hangup()

; --- Нажата 3: Запись голосового сообщения ---
exten => 3,1,NoOp(=== OPTION 3: VOICE RECORD ===)
 same => n,Playback(ivr/please_record)
 ; Биип перед записью (встроенный звук Asterisk)
 same => n,Playback(beep)
 ; Записываем в /var/spool/asterisk — это примонтированный volume
 ; silence=3 (стоп после 3с тишины), maxduration=60с, # = стоп
 same => n,Set(RECORD_FILE=/var/spool/asterisk/msg_${UNIQUEID})
 same => n,Record(${RECORD_FILE}.wav,3,60,k)
 same => n,NoOp(Recording done: ${RECORD_FILE}.wav status=${RECORD_STATUS})
 ; Воспроизводим запись обратно
 same => n,Wait(1)
 same => n,Playback(ivr/your_message_is)
 same => n,Wait(1)
 same => n,Playback(${RECORD_FILE})
 same => n,Wait(1)
 same => n,Hangup()

; --- Таймаут / неверная клавиша ---
exten => t,1,Goto(ivr-context,100,menu)
exten => i,1,Playback(ivr/invalid_option)
 same => n,Goto(ivr-context,100,menu)

; Hangup обработка
exten => h,1,NoOp(Call ended. CID=${CALLERID(num)})